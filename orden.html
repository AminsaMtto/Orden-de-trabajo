<script>
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const folio  = params.get('folio');
  const modo   = params.get('modo');

  // Solo poner fecha/hora actual si es una orden NUEVA (no en modo ver)
  if (!(folio && modo === 'ver')) {
    actualizarFechaHora();
    setInterval(actualizarFechaHora, 60000);
  }

  setupGrupos();
  if (folio && modo === 'ver') cargarOrdenExistente(folio);
});

function actualizarFechaHora() {
  const ahora = new Date();
  document.getElementById('fecha-reporte').value = formatFecha(ahora);
  document.getElementById('hora-reporte').value  = formatHora(ahora);
}
function formatFecha(d) { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function formatHora(d)  { return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

function setupGrupos() {
  document.querySelectorAll('.checkbox-field[data-grupo]').forEach(cb => {
    cb.addEventListener('change', function() {
      if (!this.checked) return;
      const grupo = this.dataset.grupo;
      document.querySelectorAll(`.checkbox-field[data-grupo="${grupo}"]`).forEach(other => {
        if (other !== this) other.checked = false;
      });
      if (grupo === 'centro') generarFolio();
    });
  });
}

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const week1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  week1.setUTCDate(week1.getUTCDate() + 1 - (week1.getUTCDay() || 7));
  return Math.ceil(((d - week1) / 86400000 + 1) / 7);
}

// Calcula qué semanas ISO tienen al menos un día dentro del mes/año dados
function semanasDelMes(anio, mes) {
  const semanas = new Set();
  const diasEnMes = new Date(anio, mes, 0).getDate(); // mes 1-12, day 0 = último día del mes
  for (let dia = 1; dia <= diasEnMes; dia++) {
    semanas.add(getWeekNumber(new Date(anio, mes - 1, dia)));
  }
  return semanas;
}

// Extrae el número de semana de un folio "ABR-semana-dia-NNN"
function semanaDelFolio(folio) {
  const partes = folio.split('-');
  if (partes.length < 4) return null;
  const n = parseInt(partes[1]);
  return isNaN(n) ? null : n;
}

// ── Lógica central: busca el mayor consecutivo del mismo área en el mes actual ──
// No depende de fecha_reporte — trabaja solo con el folio.
function extraerConsecutivos(ordenes, abr, semanasEsteMes) {
  return ordenes
    .map(o => (o.folio || '').trim())
    .filter(f => {
      if (!f.startsWith(abr + '-')) return false;        // misma área
      const sem = semanaDelFolio(f);
      return sem !== null && semanasEsteMes.has(sem);    // semana dentro del mes actual
    })
    .map(f => {
      const partes = f.split('-');
      const n = parseInt(partes[partes.length - 1]);
      return isNaN(n) ? 0 : n;
    })
    .filter(n => n > 0);
}

async function generarFolio() {
  const centroCB = document.querySelector('.checkbox-field[data-grupo="centro"]:checked');
  if (!centroCB) { document.getElementById('folio').value = ''; return; }

  const abr    = centroCB.dataset.abreviatura;
  const ahora  = new Date();
  const semana = getWeekNumber(ahora);
  const dia    = String(ahora.getDate()).padStart(2, '0');
  const prefijo = `${abr}-${semana}-${dia}-`;

  const anioActual     = ahora.getFullYear();
  const mesActual      = ahora.getMonth() + 1;           // 1-12
  const semanasEsteMes = semanasDelMes(anioActual, mesActual);

  const folioInput = document.getElementById('folio');
  const labelFolio = document.getElementById('label-folio');
  folioInput.value = '…';
  labelFolio.textContent = 'Generando…';

  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 6000);
    const res   = await fetch(SHEETS_WEBAPP_URL + '?accion=listar', { signal: controller.signal });
    clearTimeout(timer);
    const data  = await res.json();
    const remotas = data.ordenes || [];

    const consecutivos = extraerConsecutivos(remotas, abr, semanasEsteMes);
    const siguiente    = consecutivos.length > 0 ? Math.max(...consecutivos) + 1 : 1;
    const folio        = `${prefijo}${String(siguiente).padStart(3, '0')}`;

    folioInput.value       = folio;
    labelFolio.textContent = folio;

  } catch (e) {
    folioInput.value       = '';
    labelFolio.textContent = 'Sin conexión';
    mostrarToast('Sin conexión a Google Sheets. No se puede generar folio.', 'error');
  }
}

function leerFormulario() {
  const centroCB = document.querySelector('.checkbox-field[data-grupo="centro"]:checked');
  const tipoCB   = document.querySelector('.checkbox-field[data-grupo="tipo"]:checked');
  const urgCB    = document.querySelector('.checkbox-field[data-grupo="urgencia"]:checked');
  const frecCB   = document.querySelector('.checkbox-field[data-grupo="frecuencia"]:checked');
  const refSiCB  = document.getElementById('cb-refacciones-si');
  const almSiCB  = document.getElementById('cb-almacen-si');
  const centroMap = {
    'cb-zinc':'Zinc','cb-cromo':'Cromo','cb-doblado':'Doblado de Tubo','cb-oficinas':'Oficinas',
    'cb-pretratamiento':'Planta Pre-Tratamiento','cb-tratamiento':'Planta de Tratamiento',
    'cb-andenes':'Andenes y Patio de Maniobras','cb-laboratorio':'Laboratorio',
    'cb-obra-civil':'Obra Civil','cb-area-periferica':'Área Periférica','cb-otros1':'Otros'
  };
  return {
    folio: val('folio'), fecha_reporte: val('fecha-reporte'), hora_reporte: val('hora-reporte'),
    quien_reporta: val('quien-reporta'),
    centro_negocio: centroCB ? (centroMap[centroCB.id] || centroCB.dataset.abreviatura) : '',
    tipo_mantenimiento: tipoCB ? tipoCB.dataset.label : '',
    equipo_reportado: val('equipo-reportado'), no_control: val('no-control'),
    falla_reportada: val('falla-reportada'),
    grado_urgencia: urgCB ? urgCB.dataset.label : '',
    frecuencia_falla: frecCB ? frecCB.dataset.label : '',
    hora_recibo: val('hora-recibo'), fecha_atencion: val('fecha-atencion'),
    tecnicos: val('tecnicos'), diagnostico_inicial: val('diagnostico-inicial'),
    refacciones_requeridas: refSiCB && refSiCB.checked ? 'SI' : 'NO',
    refacciones_almacen: almSiCB && almSiCB.checked ? 'SI' : 'NO',
    tiempo_entrega_refacciones: val('tiempo-entrega'), actividades_previas: val('actividades-previas'),
    inicio_reparacion: val('inicio-reparacion'), hora_inicio: val('hora-inicio'),
    fecha_estimada_entrega: val('fecha-estimada-entrega'), costo_refacciones: val('costo-refacciones'),
    descripcion_reparacion: val('descripcion-reparacion'), fecha_liberacion: val('fecha-liberacion'),
    hora_entrega_equipo: val('hora-entrega-equipo'), tecnico_entrega: val('tecnico-entrega'),
    nombre_firma_recibe: val('nombre-firma-recibe'), firma_conformidad: val('firma-conformidad'),
    estado: 'ABIERTA',
  };
}

function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function imprimirOrden() {
  const campos = document.querySelectorAll('.input-field, .textarea-field');
  const phs = [];
  campos.forEach((el, i) => { phs[i] = el.placeholder; el.placeholder = ''; });
  window.print();
  setTimeout(() => { campos.forEach((el, i) => { el.placeholder = phs[i]; }); }, 500);
}

async function guardarOrdenLocal() {
  const datos = leerFormulario();
  if (!datos.folio)            { mostrarToast('Selecciona un Centro de Negocio para generar el Folio', 'error'); return; }
  if (!datos.equipo_reportado) { mostrarToast('Ingresa el equipo reportado', 'error'); return; }
  if (!datos.falla_reportada)  { mostrarToast('Describe la falla reportada', 'error'); return; }
  if (!datos.quien_reporta)    { mostrarToast('Indica quién reporta', 'error'); return; }

  const res = await guardarOrden(datos);
  if (res && res.ok) { mostrarToast(`Orden ${datos.folio} guardada en Google Sheets`, 'success'); }
  else { mostrarToast(`Error al guardar en Sheets: ${res ? res.error : 'sin conexión'}`, 'error'); return; }

  const btn = document.getElementById('btn-guardar');
  btn.textContent = '✓ Guardado'; btn.disabled = true; btn.style.opacity = '0.5';
}

async function cargarOrdenExistente(folio) {
  let orden = null;
  try {
    const res    = await fetch(SHEETS_WEBAPP_URL + '?accion=listar');
    const result = await res.json();
    orden = (result.ordenes || []).find(o => o.folio === folio) || null;
  } catch(e) { /* sin conexión */ }
  if (!orden) { mostrarToast('Orden no encontrada en Google Sheets', 'error'); return; }

  for (const [key, value] of Object.entries(orden)) {
    const id = key.replace(/_/g, '-');
    const el = document.getElementById(id);
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') && el.type !== 'checkbox') el.value = value;
  }

  const centroReverso = {
    'Zinc':'cb-zinc','Cromo':'cb-cromo','Doblado de Tubo':'cb-doblado','Oficinas':'cb-oficinas',
    'Planta Pre-Tratamiento':'cb-pretratamiento','Planta de Tratamiento':'cb-tratamiento',
    'Andenes y Patio de Maniobras':'cb-andenes','Laboratorio':'cb-laboratorio',
    'Obra Civil':'cb-obra-civil','Área Periférica':'cb-area-periferica','Otros':'cb-otros1'
  };
  if (centroReverso[orden.centro_negocio]) {
    const cb = document.getElementById(centroReverso[orden.centro_negocio]);
    if (cb) cb.checked = true;
  }

  document.querySelectorAll('.checkbox-field[data-label]').forEach(cb => {
    const g = cb.dataset.grupo, l = cb.dataset.label;
    if (g === 'tipo'       && l === orden.tipo_mantenimiento) cb.checked = true;
    if (g === 'urgencia'   && l === orden.grado_urgencia)     cb.checked = true;
    if (g === 'frecuencia' && l === orden.frecuencia_falla)   cb.checked = true;
  });

  if (orden.refacciones_requeridas === 'SI') document.getElementById('cb-refacciones-si').checked = true;
  else document.getElementById('cb-refacciones-no').checked = true;
  if (orden.refacciones_almacen === 'SI') document.getElementById('cb-almacen-si').checked = true;
  else document.getElementById('cb-almacen-no').checked = true;

  document.getElementById('label-folio').textContent = folio;

  if (orden.estado === 'CERRADA') {
    document.querySelectorAll('.campo-cierre').forEach(el => { el.classList.remove('campo-cierre'); el.style.display = ''; });
    document.getElementById('btn-guardar').style.display = 'none';
    document.getElementById('form-container').classList.add('modo-ver');
  }
}

function limpiarFormulario() {
  if (!confirm('¿Limpiar todos los campos del formulario?')) return;
  document.querySelectorAll('.input-field:not([readonly]), .textarea-field').forEach(el => el.value = '');
  document.querySelectorAll('.checkbox-field').forEach(cb => cb.checked = false);
  const btn = document.getElementById('btn-guardar');
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar Orden';
  btn.disabled = false; btn.style.opacity = '1';
  document.getElementById('label-folio').textContent = 'Nueva Orden';
  actualizarFechaHora();
}

function mostrarToast(msg, tipo = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${tipo}`;
  setTimeout(() => t.className = 'toast', 4000);
}
</script>
