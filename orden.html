<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orden de Trabajo — AMINSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul: #0d2137;
      --azul-medio: #1a3a5c;
      --azul-claro: #2563a8;
      --acento: #f59e0b;
      --verde: #16a34a;
      --rojo: #ef4444;
      --borde: #cbd5e1;
      --fondo: #f1f5f9;
      --gris: #64748b;
      --blanco: #ffffff;
      --texto: #0f172a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background-image: url("fondo-orden.jpg.jpeg");
      padding: 20px;
    }

    /* ── Barra de botones superior ── */
    .action-bar {
      width: 794px;
      margin: 0 auto 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .action-bar-left { display: flex; gap: 8px; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-primary  { background: var(--azul-claro); color: var(--blanco); }
    .btn-primary:hover  { background: #1d4ed8; }
    .btn-success  { background: var(--verde); color: var(--blanco); }
    .btn-success:hover  { background: #15803d; }
    .btn-ghost    { background: var(--blanco); color: var(--gris); border: 1.5px solid var(--borde); }
    .btn-ghost:hover    { background: var(--fondo); }

    /* ── Contenedor del formulario A4 ── */
    .form-container {
      width: 794px;
      height: 1123px;
      margin: 0 auto;
      position: relative;
      background-color: white;
      background-image: url('fondo-orden.jpg');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    }

    /* ── Campos de texto ── */
    .input-field {
      position: absolute;
      border: none;
      background: transparent;
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #000;
      outline: none;
    }
    .input-field:focus {
      background: rgba(37, 99, 168, 0.06);
      border-radius: 2px;
    }

    .textarea-field {
      position: absolute;
      border: none;
      background: transparent;
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #000;
      outline: none;
      resize: none;
      overflow: hidden;
      padding: 4px 5px;
      line-height: 1.4;
      box-sizing: border-box;
    }
    .textarea-field:focus {
      background: rgba(37, 99, 168, 0.06);
      border-radius: 2px;
    }

    /* ── Checkboxes ── */
    .checkbox-field {
      position: absolute;
      width: 14px;
      height: 14px;
      margin: 0;
      padding: 0;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border: 1.5px solid #888;
      border-radius: 2px;
      background-color: white;
    }
    .checkbox-field:checked {
      background-color: #1a3a5c;
      border-color: #1a3a5c;
    }
    .checkbox-field:checked::after {
      content: "✓";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 10px;
      font-weight: bold;
    }

    /* ── Posiciones exactas de campos ── */

    /* FOLIO */
    #folio { top: 141px; left: 629px; width: 102px; height: 22px; text-align: center; font-weight: bold; font-size: 12px; }

    /* Centro de Negocios - col 1 */
    #cb-zinc       { top: 185px; left: 200px; }
    #cb-cromo      { top: 201px; left: 200px; }
    #cb-doblado    { top: 217px; left: 200px; }
    #cb-oficinas   { top: 234px; left: 200px; }

    /* Centro de Negocios - col 2 */
    #cb-pretratamiento { top: 185px; left: 449px; }
    #cb-tratamiento    { top: 201px; left: 449px; }
    #cb-andenes        { top: 217px; left: 449px; }
    #cb-laboratorio    { top: 234px; left: 449px; }

    /* Centro de Negocios - col 3 */
    #cb-obra-civil     { top: 185px; left: 663px; }
    #cb-area-periferica{ top: 201px; left: 663px; }
    #cb-otros1         { top: 217px; left: 663px; }

    /* Tipo de Mantenimiento - col 1 */
    #cb-preventivo { top: 311px; left: 200px; }
    #cb-correctivo { top: 327px; left: 200px; }
    #cb-mejora     { top: 343px; left: 200px; }

    /* Tipo de Mantenimiento - col 2 */
    #cb-fabricacion { top: 311px; left: 449px; }
    #cb-ajuste      { top: 327px; left: 449px; }
    #cb-cambio      { top: 343px; left: 449px; }

    /* Tipo de Mantenimiento - col 3 */

    /* Equipo y No. Control */
    #equipo-reportado { top: 377px; left: 200px; width: 248px; height: 40px; }
    #no-control       { top: 377px; left: 596px; width: 132px; height: 40px; }

    /* Falla Reportada */
    #falla-reportada { top: 449px; left: 63px; width: 675px; height: 62px; }

    /* Grado de Urgencia */
    #cb-alto       { top: 534px; left: 235px; }
    #cb-medio      { top: 534px; left: 340px; }
    #cb-bajo       { top: 534px; left: 450px; }

    #cb-segunda { top: 551px; left: 340px; }
    #cb-tercera { top: 551px; left: 450px; }

    /* Primera fila de fechas */

    #hora-reporte   { top: 579px; left: 364px; width: 105px; height: 15px; }

    #fecha-atencion { top: 600px; left: 364px; width: 105px; height: 15px; }

    /* Diagnóstico Inicial */
    #diagnostico-inicial { top: 650px; left: 63px; width: 675px; height: 62px; }

    /* Checkboxes Refacciones */
    #cb-refacciones-si { top: 730px; left: 270px; }
    #cb-refacciones-no { top: 730px; left: 360px; }
    #cb-almacen-si     { top: 746px; left: 270px; }
    #cb-almacen-no     { top: 746px; left: 360px; }
    #tiempo-entrega    { top: 762px; left: 200px; width: 150px; height: 15px; }

    /* Actividades Previas / Inicio Reparación */
    #actividades-previas  { top: 786px; left: 280px; width: 220px; height: 15px; }
    #inicio-reparacion    { top: 802px; left: 280px; width: 170px; height: 15px; }
    #hora-inicio          { top: 802px; left: 560px; width: 80px;  height: 15px; }

    /* Fecha Estimada y Costo */
    #fecha-estimada-entrega { top: 826px; left: 185px; width: 135px; height: 15px; }
    #costo-refacciones      { top: 826px; left: 520px; width: 160px; height: 15px; }

    /* Descripción de la Reparación */
    #descripcion-reparacion { top: 863px; left: 63px; width: 675px; height: 62px; }

    /* Cierre */
    #fecha-liberacion    { top: 941px; left: 133px; width: 115px; height: 15px; }
    #hora-entrega-equipo { top: 941px; left: 390px; width: 100px; height: 15px; }
    #tecnico-entrega     { top: 941px; left: 596px; width: 140px; height: 15px; }
    #nombre-firma-recibe { top: 963px; left: 300px; width: 438px; height: 15px; }
    #firma-conformidad   { top: 985px; left: 370px; width: 368px; height: 15px; }

    /* ── Modo solo lectura (impresión) ── */
    .modo-ver .input-field,
    .modo-ver .textarea-field,
    .modo-ver .checkbox-field {
      pointer-events: none;
    }

    /* ── Impresión ── */
    @page {
      size: A4;
      margin: 0;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    @media print {
      body { margin: 0; padding: 0; background: none; }
      .action-bar { display: none !important; }
      .form-container {
        box-shadow: none;
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        margin: 0;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--azul);
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      border-left: 4px solid var(--acento);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 9999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: var(--rojo); }
    .toast.success { border-left-color: var(--verde); }
  </style>
</head>

<script>
// ── Contador de folios ──────────────────────────────────────
const contadorOrdenes = JSON.parse(localStorage.getItem('contadorOrdenes') || '{}');

// ── Inicialización ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  actualizarFechaHora();
  setInterval(actualizarFechaHora, 60000);
  setupGrupos();

  // Modo ver (desde dashboard)
  const params = new URLSearchParams(window.location.search);
  const folio  = params.get('folio');
  const modo   = params.get('modo');

  if (folio && modo === 'ver') {
    cargarOrdenExistente(folio);
  }
});

// ── Fecha/hora automática ──────────────────────────────────
function actualizarFechaHora() {
  const ahora = new Date();
  document.getElementById('fecha-reporte').value = formatFecha(ahora);
  document.getElementById('hora-reporte').value  = formatHora(ahora);
}
function formatFecha(d) {
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function formatHora(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function formatFechaISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Checkboxes mutuamente excluyentes por grupo ────────────
function setupGrupos() {
  document.querySelectorAll('.checkbox-field[data-grupo]').forEach(cb => {
    cb.addEventListener('change', function() {
      if (!this.checked) return;
      const grupo = this.dataset.grupo;
      document.querySelectorAll(`.checkbox-field[data-grupo="${grupo}"]`).forEach(other => {
        if (other !== this) other.checked = false;
      });
      // Actualizar folio si es centro de negocio
      if (grupo === 'centro') generarFolio();
    });
  });
}

// ── Generación de Folio ────────────────────────────────────
function generarFolio() {
  const centroCB = document.querySelector('.checkbox-field[data-grupo="centro"]:checked');
  if (!centroCB) { document.getElementById('folio').value = ''; return; }

  const abr  = centroCB.dataset.abreviatura;
  const ahora = new Date();
  const semana = getWeekNumber(ahora);
  const dia    = ahora.getDate();

  if (!contadorOrdenes[abr]) contadorOrdenes[abr] = 1;

  const folio = `${abr}-${semana}-${String(dia).padStart(2,'0')}-${String(contadorOrdenes[abr]).padStart(3,'0')}`;
  document.getElementById('folio').value = folio;
  document.getElementById('label-folio').textContent = folio;
}

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const week1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  week1.setUTCDate(week1.getUTCDate() + 1 - (week1.getUTCDay() || 7));
  return Math.ceil(((d - week1) / 86400000 + 1) / 7);
}

// ── Leer datos del formulario ──────────────────────────────
function leerFormulario() {
  const centroCB = document.querySelector('.checkbox-field[data-grupo="centro"]:checked');
  const tipoCB   = document.querySelector('.checkbox-field[data-grupo="tipo"]:checked');
  const urgCB    = document.querySelector('.checkbox-field[data-grupo="urgencia"]:checked');
  const frecCB   = document.querySelector('.checkbox-field[data-grupo="frecuencia"]:checked');
  const refSiCB  = document.getElementById('cb-refacciones-si');
  const almSiCB  = document.getElementById('cb-almacen-si');

  // Mapeo de ids a etiquetas de centros
  const centroMap = {
    'cb-zinc': 'Zinc', 'cb-cromo': 'Cromo', 'cb-doblado': 'Doblado de Tubo',
    'cb-oficinas': 'Oficinas', 'cb-pretratamiento': 'Planta Pre-Tratamiento',
    'cb-tratamiento': 'Planta de Tratamiento', 'cb-andenes': 'Andenes y Patio de Maniobras',
    'cb-laboratorio': 'Laboratorio', 'cb-obra-civil': 'Obra Civil',
    'cb-area-periferica': 'Área Periférica', 'cb-otros1': 'Otros'
  };

  return {
    folio:                   val('folio'),
    fecha_reporte:           val('fecha-reporte'),
    hora_reporte:            val('hora-reporte'),
    quien_reporta:           val('quien-reporta'),
    centro_negocio:          centroCB ? (centroMap[centroCB.id] || centroCB.dataset.abreviatura) : '',
    tipo_mantenimiento:      tipoCB   ? tipoCB.dataset.label   : '',
    equipo_reportado:        val('equipo-reportado'),
    no_control:              val('no-control'),
    falla_reportada:         val('falla-reportada'),
    grado_urgencia:          urgCB    ? urgCB.dataset.label    : '',
    frecuencia_falla:        frecCB   ? frecCB.dataset.label   : '',
    hora_recibo:             val('hora-recibo'),
    fecha_atencion:          val('fecha-atencion'),
    tecnicos:                val('tecnicos'),
    diagnostico_inicial:     val('diagnostico-inicial'),
    refacciones_requeridas:  refSiCB.checked ? 'SI' : 'NO',
    refacciones_almacen:     almSiCB.checked ? 'SI' : 'NO',
    tiempo_entrega_refacciones: val('tiempo-entrega'),
    actividades_previas:     val('actividades-previas'),
    inicio_reparacion:       val('inicio-reparacion'),
    hora_inicio:             val('hora-inicio'),
    fecha_estimada_entrega:  val('fecha-estimada-entrega'),
    costo_refacciones:       val('costo-refacciones'),
    descripcion_reparacion:  val('descripcion-reparacion'),
    fecha_liberacion:        val('fecha-liberacion'),
    hora_entrega_equipo:     val('hora-entrega-equipo'),
    tecnico_entrega:         val('tecnico-entrega'),
    nombre_firma_recibe:     val('nombre-firma-recibe'),
    firma_conformidad:       val('firma-conformidad'),
    estado:                  'ABIERTA',
  };
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

// ── Guardar orden ──────────────────────────────────────────
async function guardarOrdenLocal() {
  const datos = leerFormulario();

  // Validaciones básicas
  if (!datos.folio) {
    mostrarToast('Selecciona un Centro de Negocio para generar el Folio', 'error');
    return;
  }
  if (!datos.equipo_reportado) {
    mostrarToast('Ingresa el equipo reportado', 'error');
    return;
  }
  if (!datos.falla_reportada) {
    mostrarToast('Describe la falla reportada', 'error');
    return;
  }
  if (!datos.quien_reporta) {
    mostrarToast('Indica quién reporta', 'error');
    return;
  }

  // 1. Guardar localmente
  const locales = JSON.parse(localStorage.getItem('ordenes_local') || '[]');
  const existeIdx = locales.findIndex(o => o.folio === datos.folio);
  if (existeIdx >= 0) {
    locales[existeIdx] = datos;
  } else {
    locales.push(datos);
    // Incrementar contador
    const abr = document.querySelector('.checkbox-field[data-grupo="centro"]:checked')?.dataset.abreviatura;
    if (abr) {
      contadorOrdenes[abr] = (contadorOrdenes[abr] || 1) + 1;
      localStorage.setItem('contadorOrdenes', JSON.stringify(contadorOrdenes));
    }
  }
  localStorage.setItem('ordenes_local', JSON.stringify(locales));

  // 2. Intentar guardar en Google Sheets
  const res = await guardarOrden(datos);
  if (res.ok) {
    mostrarToast(`Orden ${datos.folio} guardada en Google Sheets ✓`, 'success');
  } else {
    mostrarToast(`Orden guardada localmente. (${res.error || 'Sheets no configurado'})`, '');
  }

  // Deshabilitar botón para evitar duplicados
  const btn = document.getElementById('btn-guardar');
  btn.textContent = '✓ Guardado';
  btn.disabled = true;
  btn.style.opacity = '0.6';
}

// ── Cargar orden existente (modo ver) ─────────────────────
function cargarOrdenExistente(folio) {
  const locales = JSON.parse(localStorage.getItem('ordenes_local') || '[]');
  const orden = locales.find(o => o.folio === folio);
  if (!orden) { mostrarToast('Orden no encontrada localmente', 'error'); return; }

  // Llenar campos
  for (const [key, value] of Object.entries(orden)) {
    const id = key.replace(/_/g, '-');
    const el = document.getElementById(id);
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') && el.type !== 'checkbox') {
      el.value = value;
    }
  }

  // Marcar checkboxes de centro
  const centroReverso = {
    'Zinc': 'cb-zinc', 'Cromo': 'cb-cromo', 'Doblado de Tubo': 'cb-doblado',
    'Oficinas': 'cb-oficinas', 'Planta Pre-Tratamiento': 'cb-pretratamiento',
    'Planta de Tratamiento': 'cb-tratamiento', 'Andenes y Patio de Maniobras': 'cb-andenes',
    'Laboratorio': 'cb-laboratorio', 'Obra Civil': 'cb-obra-civil',
    'Área Periférica': 'cb-area-periferica', 'Otros': 'cb-otros1'
  };
  if (centroReverso[orden.centro_negocio]) {
    const cb = document.getElementById(centroReverso[orden.centro_negocio]);
    if (cb) cb.checked = true;
  }

  // Marcar resto de checkboxes por label
  document.querySelectorAll('.checkbox-field[data-label]').forEach(cb => {
    const grupo = cb.dataset.grupo;
    const label = cb.dataset.label;
    if (grupo === 'tipo'       && label === orden.tipo_mantenimiento)  cb.checked = true;
    if (grupo === 'urgencia'   && label === orden.grado_urgencia)      cb.checked = true;
    if (grupo === 'frecuencia' && label === orden.frecuencia_falla)    cb.checked = true;
  });

  if (orden.refacciones_requeridas === 'SI') document.getElementById('cb-refacciones-si').checked = true;
  else document.getElementById('cb-refacciones-no').checked = true;
  if (orden.refacciones_almacen === 'SI') document.getElementById('cb-almacen-si').checked = true;
  else document.getElementById('cb-almacen-no').checked = true;

  document.getElementById('label-folio').textContent = folio;

  // Modo solo lectura si está cerrada
  if (orden.estado === 'CERRADA') {
    document.getElementById('btn-guardar').style.display = 'none';
    document.getElementById('form-container').classList.add('modo-ver');
  }
}

// ── Limpiar formulario ─────────────────────────────────────
function limpiarFormulario() {
  if (!confirm('¿Limpiar todos los campos del formulario?')) return;
  document.querySelectorAll('.input-field:not([readonly]), .textarea-field').forEach(el => el.value = '');
  document.querySelectorAll('.checkbox-field').forEach(cb => cb.checked = false);
  const btn = document.getElementById('btn-guardar');
  btn.textContent = '💾 Guardar Orden';
  btn.disabled = false;
  btn.style.opacity = '1';
  document.getElementById('label-folio').textContent = 'Nueva Orden';
  actualizarFechaHora();
}

// ── Toast ──────────────────────────────────────────────────
function mostrarToast(msg, tipo = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${tipo}`;
  setTimeout(() => t.className = 'toast', 4000);
}
</script>
