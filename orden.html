    .input-field {

      background: transparent;
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      color: #111;
      outline: none;
    }
    .input-field:focus {
      background: rgba(14,14,14,0.05);
      border-radius: 1px;
    }

    .textarea-field {
      position: absolute;
      border: none;
      background: transparent;
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      color: #111;
      outline: none;
      resize: none;
      overflow: hidden;
      padding: 4px 5px;
      line-height: 1.4;
      box-sizing: border-box;
    }
    .textarea-field:focus {

      border-radius: 1px;
    }

    /* ── CHECKBOXES ── */
    .checkbox-field {
      position: absolute;
      width: 35px;
      height: 15px;
      margin: 0;
      padding: 0;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      border: 1.5px solid #aaa;
      border-radius: 1px;
      background-color: white;
      transition: all 0.15s;

    .checkbox-field:checked {
      background-color: var(--negro);
      border-color: var(--negro);
    }
    .checkbox-field:checked::after {
      content: "✓";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 9px;
      font-weight: bold;

<script>
const contadorOrdenes = JSON.parse(localStorage.getItem('contadorOrdenes') || '{}');

document.addEventListener('DOMContentLoaded', () => {
  actualizarFechaHora();
  setInterval(actualizarFechaHora, 60000);
  setupGrupos();

  const params = new URLSearchParams(window.location.search);
  const folio  = params.get('folio');
  const modo   = params.get('modo');
  if (folio && modo === 'ver') cargarOrdenExistente(folio);
});

function actualizarFechaHora() {
  const ahora = new Date();
  document.getElementById('fecha-reporte').value = formatFecha(ahora);
  document.getElementById('hora-reporte').value  = formatHora(ahora);
}
function formatFecha(d) {
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function formatHora(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function setupGrupos() {
  document.querySelectorAll('.checkbox-field[data-grupo]').forEach(cb => {
    cb.addEventListener('change', function() {
      if (!this.checked) return;
      const grupo = this.dataset.grupo;
      document.querySelectorAll(`.checkbox-field[data-grupo="${grupo}"]`).forEach(other => {
        if (other !== this) other.checked = false;
      });
      if (grupo === 'centro') generarFolio();
    });
  });
}

function generarFolio() {
  const centroCB = document.querySelector('.checkbox-field[data-grupo="centro"]:checked');
  if (!centroCB) { document.getElementById('folio').value = ''; return; }
  const abr    = centroCB.dataset.abreviatura;
  const ahora  = new Date();
  const semana = getWeekNumber(ahora);
  const dia    = ahora.getDate();
  if (!contadorOrdenes[abr]) contadorOrdenes[abr] = 1;
  const folio = `${abr}-${semana}-${String(dia).padStart(2,'0')}-${String(contadorOrdenes[abr]).padStart(3,'0')}`;
  document.getElementById('folio').value = folio;
  document.getElementById('label-folio').textContent = folio;
}

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const week1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  week1.setUTCDate(week1.getUTCDate() + 1 - (week1.getUTCDay() || 7));
  return Math.ceil(((d - week1) / 86400000 + 1) / 7);
}

function leerFormulario() {
  const centroCB = document.querySelector('.checkbox-field[data-grupo="centro"]:checked');
  const tipoCB   = document.querySelector('.checkbox-field[data-grupo="tipo"]:checked');
  const urgCB    = document.querySelector('.checkbox-field[data-grupo="urgencia"]:checked');
  const frecCB   = document.querySelector('.checkbox-field[data-grupo="frecuencia"]:checked');
  const refSiCB  = document.getElementById('cb-refacciones-si');
  const almSiCB  = document.getElementById('cb-almacen-si');

  const centroMap = {
    'cb-zinc': 'Zinc', 'cb-cromo': 'Cromo', 'cb-doblado': 'Doblado de Tubo',
    'cb-oficinas': 'Oficinas', 'cb-pretratamiento': 'Planta Pre-Tratamiento',
    'cb-tratamiento': 'Planta de Tratamiento', 'cb-andenes': 'Andenes y Patio de Maniobras',
    'cb-laboratorio': 'Laboratorio', 'cb-obra-civil': 'Obra Civil',
    'cb-area-periferica': 'Área Periférica', 'cb-otros1': 'Otros'
  };

  return {
    folio:                      val('folio'),
    fecha_reporte:              val('fecha-reporte'),
    hora_reporte:               val('hora-reporte'),
    quien_reporta:              val('quien-reporta'),
    centro_negocio:             centroCB ? (centroMap[centroCB.id] || centroCB.dataset.abreviatura) : '',
    tipo_mantenimiento:         tipoCB   ? tipoCB.dataset.label   : '',
    equipo_reportado:           val('equipo-reportado'),
    no_control:                 val('no-control'),
    falla_reportada:            val('falla-reportada'),
    grado_urgencia:             urgCB    ? urgCB.dataset.label    : '',
    frecuencia_falla:           frecCB   ? frecCB.dataset.label   : '',
    hora_recibo:                val('hora-recibo'),
    fecha_atencion:             val('fecha-atencion'),
    tecnicos:                   val('tecnicos'),
    diagnostico_inicial:        val('diagnostico-inicial'),
    refacciones_requeridas:     refSiCB.checked ? 'SI' : 'NO',
    refacciones_almacen:        almSiCB.checked ? 'SI' : 'NO',
    tiempo_entrega_refacciones: val('tiempo-entrega'),
    actividades_previas:        val('actividades-previas'),
    inicio_reparacion:          val('inicio-reparacion'),
    hora_inicio:                val('hora-inicio'),
    fecha_estimada_entrega:     val('fecha-estimada-entrega'),
    costo_refacciones:          val('costo-refacciones'),
    descripcion_reparacion:     val('descripcion-reparacion'),
    fecha_liberacion:           val('fecha-liberacion'),
    hora_entrega_equipo:        val('hora-entrega-equipo'),
    tecnico_entrega:            val('tecnico-entrega'),
    nombre_firma_recibe:        val('nombre-firma-recibe'),
    firma_conformidad:          val('firma-conformidad'),
    estado:                     'ABIERTA',
  };
}

function val(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}

async function guardarOrdenLocal() {
  const datos = leerFormulario();

  if (!datos.folio)            { mostrarToast('Selecciona un Centro de Negocio para generar el Folio', 'error'); return; }
  if (!datos.equipo_reportado) { mostrarToast('Ingresa el equipo reportado', 'error'); return; }
  if (!datos.falla_reportada)  { mostrarToast('Describe la falla reportada', 'error'); return; }
  if (!datos.quien_reporta)    { mostrarToast('Indica quién reporta', 'error'); return; }

  const locales = JSON.parse(localStorage.getItem('ordenes_local') || '[]');
  const existeIdx = locales.findIndex(o => o.folio === datos.folio);
  if (existeIdx >= 0) {
    locales[existeIdx] = datos;
  } else {
    locales.push(datos);
    const abr = document.querySelector('.checkbox-field[data-grupo="centro"]:checked')?.dataset.abreviatura;
    if (abr) {
      contadorOrdenes[abr] = (contadorOrdenes[abr] || 1) + 1;
      localStorage.setItem('contadorOrdenes', JSON.stringify(contadorOrdenes));
    }
  }
  localStorage.setItem('ordenes_local', JSON.stringify(locales));

  const res = await guardarOrden(datos);
  if (res.ok) {
    mostrarToast(`Orden ${datos.folio} guardada en Google Sheets`, 'success');
  } else {
    mostrarToast(`Guardada localmente. (${res.error || 'Sheets no configurado'})`, '');
  }

  const btn = document.getElementById('btn-guardar');
  btn.textContent = '✓ Guardado';
  btn.disabled = true;
  btn.style.opacity = '0.5';
}

function cargarOrdenExistente(folio) {
  const locales = JSON.parse(localStorage.getItem('ordenes_local') || '[]');
  const orden = locales.find(o => o.folio === folio);
  if (!orden) { mostrarToast('Orden no encontrada localmente', 'error'); return; }

  for (const [key, value] of Object.entries(orden)) {
    const id = key.replace(/_/g, '-');
    const el = document.getElementById(id);
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') && el.type !== 'checkbox') {
      el.value = value;
    }
  }

  const centroReverso = {
    'Zinc': 'cb-zinc', 'Cromo': 'cb-cromo', 'Doblado de Tubo': 'cb-doblado',
    'Oficinas': 'cb-oficinas', 'Planta Pre-Tratamiento': 'cb-pretratamiento',
    'Planta de Tratamiento': 'cb-tratamiento', 'Andenes y Patio de Maniobras': 'cb-andenes',
    'Laboratorio': 'cb-laboratorio', 'Obra Civil': 'cb-obra-civil',
    'Área Periférica': 'cb-area-periferica', 'Otros': 'cb-otros1'
  };
  if (centroReverso[orden.centro_negocio]) {
    const cb = document.getElementById(centroReverso[orden.centro_negocio]);
    if (cb) cb.checked = true;
  }

  document.querySelectorAll('.checkbox-field[data-label]').forEach(cb => {
    const grupo = cb.dataset.grupo;
    const label = cb.dataset.label;
    if (grupo === 'tipo'       && label === orden.tipo_mantenimiento) cb.checked = true;
    if (grupo === 'urgencia'   && label === orden.grado_urgencia)     cb.checked = true;
    if (grupo === 'frecuencia' && label === orden.frecuencia_falla)   cb.checked = true;
  });

  if (orden.refacciones_requeridas === 'SI') document.getElementById('cb-refacciones-si').checked = true;
  else document.getElementById('cb-refacciones-no').checked = true;
  if (orden.refacciones_almacen === 'SI') document.getElementById('cb-almacen-si').checked = true;
  else document.getElementById('cb-almacen-no').checked = true;

  document.getElementById('label-folio').textContent = folio;

  if (orden.estado === 'CERRADA') {
    document.getElementById('btn-guardar').style.display = 'none';
    document.getElementById('form-container').classList.add('modo-ver');
  }
}

function limpiarFormulario() {
  if (!confirm('¿Limpiar todos los campos del formulario?')) return;
  document.querySelectorAll('.input-field:not([readonly]), .textarea-field').forEach(el => el.value = '');
  document.querySelectorAll('.checkbox-field').forEach(cb => cb.checked = false);
  const btn = document.getElementById('btn-guardar');
  btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar Orden';
  btn.disabled = false;
  btn.style.opacity = '1';
  document.getElementById('label-folio').textContent = 'Nueva Orden';
  actualizarFechaHora();
}

function mostrarToast(msg, tipo = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${tipo}`;
  setTimeout(() => t.className = 'toast', 4000);
}
</script>
